# Cloudflare Workers deploy config for the InfoLang Vapi memory webhook.
#
# 1. Set secrets (never commit them):
#      npx wrangler secret put INFOLANG_API_KEY   # il_live_...
#      npx wrangler secret put VAPI_SECRET         # matches your Vapi server secret
# 2. Deploy:  npm run deploy
# 3. Point your Vapi Server URL at the deployed https://<worker>.workers.dev/ URL.

name = "infolang-vapi"
main = "src/worker.ts"
compatibility_date = "2024-11-01"

# Optional non-secret vars (secrets are set with `wrangler secret put`):
# [vars]
# INFOLANG_WORKSPACE = "your-tenant"
